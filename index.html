<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Viewer</title>
  <meta name="description" content="Browser-based 3D model viewer. Drag and drop GLB files to view, rotate, and explore 3D models." />

  <!-- Open Graph -->
  <meta property="og:title" content="3D Model Viewer" />
  <meta property="og:description" content="Browser-based 3D model viewer. Drag and drop GLB files to view, rotate, and explore 3D models." />
  <meta property="og:image" content="og-image.webp" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/webp" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="3D Model Viewer" />
  <meta name="twitter:description" content="Browser-based 3D model viewer. Drag and drop GLB files to view, rotate, and explore 3D models." />
  <meta name="twitter:image" content="og-image.webp" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas { display: block; }

    /* Drop zone overlay */
    #drop-zone {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s, opacity 0.3s;
    }

    #drop-zone.hidden {
      pointer-events: none;
      opacity: 0;
    }

    #drop-zone.dragging {
      background: rgba(99, 102, 241, 0.12);
      pointer-events: all !important;
      opacity: 1 !important;
    }

    .drop-icon {
      width: 80px;
      height: 80px;
      border: 2px dashed #444;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      transition: border-color 0.2s, transform 0.2s;
    }

    #drop-zone.dragging .drop-icon {
      border-color: #6366f1;
      transform: scale(1.08);
    }

    .drop-icon svg {
      width: 36px;
      height: 36px;
      stroke: #555;
      transition: stroke 0.2s;
    }

    #drop-zone.dragging .drop-icon svg { stroke: #6366f1; }

    .drop-text {
      font-size: 18px;
      font-weight: 500;
      color: #888;
      margin-bottom: 8px;
    }

    .drop-subtext {
      font-size: 13px;
      color: #555;
    }

    .drop-subtext label {
      color: #6366f1;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .drop-subtext label:hover { color: #818cf8; }

    #file-input { display: none; }

    /* Top bar */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1a1a;
      z-index: 20;
    }

    .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo svg { width: 20px; height: 20px; }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #141414;
      color: #ccc;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .btn:hover { background: #1e1e1e; border-color: #3a3a3a; color: #fff; }
    .btn svg { width: 14px; height: 14px; }

    /* Info panel */
    #info-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 12px;
      z-index: 20;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      min-width: 200px;
    }

    #info-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }

    .info-label { color: #666; }
    .info-value { color: #bbb; font-variant-numeric: tabular-nums; }

    #anim-list {
      margin-top: 8px;
      border-top: 1px solid #2a2a2a;
      padding-top: 8px;
      display: none;
      max-height: 160px;
      overflow-y: auto;
    }

    #anim-list.visible { display: block; }

    .anim-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .anim-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 12px;
      color: #999;
    }

    .anim-item:hover { background: rgba(255,255,255,0.05); }
    .anim-item.active { color: #6366f1; background: rgba(99, 102, 241, 0.1); }

    .anim-item .anim-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    .anim-item .anim-dur {
      font-size: 10px;
      color: #555;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .anim-item.active .anim-dur { color: #818cf8; }

    /* Controls panel */
    #controls-panel {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #controls-panel.visible { opacity: 1; }

    .ctrl-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #222;
      border-radius: 10px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(12px);
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .ctrl-btn:hover { background: #1e1e1e; color: #fff; border-color: #3a3a3a; }
    .ctrl-btn.active { color: #6366f1; border-color: #6366f1; }
    .ctrl-btn svg { width: 16px; height: 16px; }

    /* Loading */
    #loader {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 10, 0.8);
      z-index: 30;
    }

    #loader.active { display: flex; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #222;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error toast */
    #error-toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #dc2626;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 40;
      pointer-events: none;
    }

    #error-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <!-- Top bar -->
    <div id="top-bar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        GLB Viewer
      </div>
      <div class="top-actions">
        <button class="btn" id="open-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Open
        </button>
        <button class="btn" id="screenshot-btn" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Screenshot
        </button>
      </div>
    </div>

    <!-- Drop zone -->
    <div id="drop-zone">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-text">Drop a .glb or .gltf file here</div>
      <div class="drop-subtext">or <label for="file-input">browse files</label></div>
    </div>

    <input type="file" id="file-input" accept=".glb,.gltf" />

    <!-- Info panel -->
    <div id="info-panel">
      <div class="info-row">
        <span class="info-label">File</span>
        <span class="info-value" id="info-name">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Size</span>
        <span class="info-value" id="info-size">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Vertices</span>
        <span class="info-value" id="info-verts">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Triangles</span>
        <span class="info-value" id="info-tris">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Meshes</span>
        <span class="info-value" id="info-meshes">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Materials</span>
        <span class="info-value" id="info-materials">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Animations</span>
        <span class="info-value" id="info-anims">—</span>
      </div>
      <div id="anim-list"></div>
    </div>

    <!-- Controls -->
    <div id="controls-panel">
      <button class="ctrl-btn" id="btn-wireframe" title="Wireframe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="12" y1="3" x2="12" y2="21"/>
        </svg>
      </button>
      <button class="ctrl-btn active" id="btn-grid" title="Grid">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="3" x2="3" y2="21"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="15" y1="3" x2="15" y2="21"/>
          <line x1="21" y1="3" x2="21" y2="21"/>
          <line x1="3" y1="3" x2="21" y2="3"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="3" y1="21" x2="21" y2="21"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-autorotate" title="Auto-rotate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-center" title="Center model">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
        </svg>
      </button>
    </div>

    <!-- Loader -->
    <div id="loader"><div class="spinner"></div></div>

    <!-- Error toast -->
    <div id="error-toast"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // DOM elements
    const container = document.getElementById('canvas-container');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const loaderEl = document.getElementById('loader');
    const errorToast = document.getElementById('error-toast');

    // Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(3, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 0.1;
    controls.maxDistance = 100;
    controls.target.set(0, 0, 0);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0xb4c6fc, 0.8);
    fillLight.position.set(-3, 4, -4);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffc880, 0.4);
    rimLight.position.set(0, 2, -6);
    scene.add(rimLight);

    // Background gradient
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2;
    bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(0.5, '#111118');
    grad.addColorStop(1, '#0a0a0a');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(bgCanvas);

    // Grid
    const gridHelper = new THREE.GridHelper(20, 40, 0x222233, 0x161622);
    gridHelper.material.opacity = 0.6;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Ground shadow plane
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.ShadowMaterial({ opacity: 0.3 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    // GLTF Loader
    const gltfLoader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    gltfLoader.setDRACOLoader(dracoLoader);

    let currentModel = null;
    let mixer = null;
    let animActions = [];
    const clock = new THREE.Clock();

    // ---- Error display ----
    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add('visible');
      setTimeout(() => errorToast.classList.remove('visible'), 4000);
    }

    // ---- Drag & Drop ----
    let dragCounter = 0;

    document.addEventListener('dragenter', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragCounter++;
      dropZone.classList.remove('hidden');
      dropZone.classList.add('dragging');
    });

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'copy';
    });

    document.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropZone.classList.remove('dragging');
        if (currentModel) dropZone.classList.add('hidden');
      }
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragCounter = 0;
      dropZone.classList.remove('dragging');
      if (currentModel) dropZone.classList.add('hidden');

      const files = e.dataTransfer.files;
      if (files.length === 0) return;
      const file = files[0];
      const name = file.name.toLowerCase();
      if (name.endsWith('.glb') || name.endsWith('.gltf')) {
        loadFile(file);
      } else {
        showError('Please drop a .glb or .gltf file');
      }
    });

    // ---- File input ----
    document.getElementById('open-btn').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadFile(e.target.files[0]);
      fileInput.value = '';
    });

    // ---- Load model ----
    function loadFile(file) {
      loaderEl.classList.add('active');

      // Clean up previous model
      if (currentModel) {
        scene.remove(currentModel);
        currentModel.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(m => m.dispose());
          }
        });
        currentModel = null;
      }
      mixer = null;

      const reader = new FileReader();
      reader.onload = (e) => {
        const arrayBuffer = e.target.result;

        gltfLoader.parse(arrayBuffer, '', (gltf) => {
          currentModel = gltf.scene;

          // Enable shadows on all meshes
          currentModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          scene.add(currentModel);

          // Fit camera to model
          const box = new THREE.Box3().setFromObject(currentModel);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const distance = maxDim * 1.5 / Math.tan((camera.fov * Math.PI) / 360);

          // Place model on ground
          currentModel.position.y -= box.min.y;
          box.setFromObject(currentModel);
          box.getCenter(center);

          controls.target.copy(center);
          camera.position.set(
            center.x + distance * 0.5,
            center.y + distance * 0.4,
            center.z + distance * 0.7
          );
          camera.near = maxDim * 0.001;
          camera.far = maxDim * 100;
          camera.updateProjectionMatrix();
          controls.update();

          // Scale grid to model
          gridHelper.scale.setScalar(Math.max(1, maxDim / 5));

          // Play animations
          animActions = [];
          if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(currentModel);
            gltf.animations.forEach((clip) => {
              const action = mixer.clipAction(clip);
              action.play();
              animActions.push(action);
            });
          }

          // Update UI
          updateInfo(file, gltf);
          dropZone.classList.add('hidden');
          document.getElementById('info-panel').classList.add('visible');
          document.getElementById('controls-panel').classList.add('visible');
          document.getElementById('screenshot-btn').style.display = 'flex';
          loaderEl.classList.remove('active');

        }, (error) => {
          console.error('GLB parse error:', error);
          showError('Failed to load model: ' + (error.message || 'Unknown error'));
          loaderEl.classList.remove('active');
        });
      };

      reader.onerror = () => {
        showError('Failed to read file');
        loaderEl.classList.remove('active');
      };

      reader.readAsArrayBuffer(file);
    }

    // ---- Model info ----
    function updateInfo(file, gltf) {
      let verts = 0, tris = 0, meshCount = 0;
      const materials = new Set();

      gltf.scene.traverse((child) => {
        if (child.isMesh) {
          meshCount++;
          const geo = child.geometry;
          if (geo.attributes.position) verts += geo.attributes.position.count;
          if (geo.index) {
            tris += geo.index.count / 3;
          } else if (geo.attributes.position) {
            tris += geo.attributes.position.count / 3;
          }
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => materials.add(m));
        }
      });

      const sizeKB = file.size / 1024;
      const sizeStr = sizeKB > 1024 ? (sizeKB / 1024).toFixed(1) + ' MB' : sizeKB.toFixed(0) + ' KB';

      document.getElementById('info-name').textContent =
        file.name.length > 20 ? file.name.slice(0, 18) + '...' : file.name;
      document.getElementById('info-size').textContent = sizeStr;
      document.getElementById('info-verts').textContent = verts.toLocaleString();
      document.getElementById('info-tris').textContent = Math.floor(tris).toLocaleString();
      document.getElementById('info-meshes').textContent = meshCount;
      document.getElementById('info-materials').textContent = materials.size;
      document.getElementById('info-anims').textContent = (gltf.animations || []).length;

      // Build animation list
      const animList = document.getElementById('anim-list');
      animList.innerHTML = '';

      const anims = gltf.animations || [];
      if (anims.length > 0) {
        animList.classList.add('visible');
        const label = document.createElement('div');
        label.className = 'anim-label';
        label.textContent = 'Animations';
        animList.appendChild(label);

        anims.forEach((clip, i) => {
          const item = document.createElement('div');
          item.className = 'anim-item active';
          const name = document.createElement('span');
          name.className = 'anim-name';
          name.textContent = clip.name || `Animation ${i + 1}`;
          name.title = clip.name || `Animation ${i + 1}`;
          const dur = document.createElement('span');
          dur.className = 'anim-dur';
          dur.textContent = clip.duration.toFixed(1) + 's';
          item.appendChild(name);
          item.appendChild(dur);

          item.addEventListener('click', () => {
            const action = animActions[i];
            if (!action) return;
            if (item.classList.contains('active')) {
              action.stop();
              item.classList.remove('active');
            } else {
              action.play();
              item.classList.add('active');
            }
          });

          animList.appendChild(item);
        });
      } else {
        animList.classList.remove('visible');
      }
    }

    // ---- Control buttons ----
    document.getElementById('btn-wireframe').addEventListener('click', function () {
      this.classList.toggle('active');
      const wireframe = this.classList.contains('active');
      if (currentModel) {
        currentModel.traverse((child) => {
          if (child.isMesh) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(m => m.wireframe = wireframe);
          }
        });
      }
    });

    document.getElementById('btn-grid').addEventListener('click', function () {
      this.classList.toggle('active');
      gridHelper.visible = this.classList.contains('active');
    });

    document.getElementById('btn-autorotate').addEventListener('click', function () {
      this.classList.toggle('active');
      controls.autoRotate = this.classList.contains('active');
      controls.autoRotateSpeed = 2;
    });

    document.getElementById('btn-center').addEventListener('click', () => {
      if (!currentModel) return;
      const box = new THREE.Box3().setFromObject(currentModel);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim * 1.5 / Math.tan((camera.fov * Math.PI) / 360);

      controls.target.copy(center);
      camera.position.set(
        center.x + distance * 0.5,
        center.y + distance * 0.4,
        center.z + distance * 0.7
      );
      controls.update();
    });

    document.getElementById('screenshot-btn').addEventListener('click', () => {
      renderer.render(scene, camera);
      const link = document.createElement('a');
      link.download = 'model-screenshot.png';
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
    });

    // ---- Resize ----
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---- Render loop ----
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer) mixer.update(delta);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    console.log('GLB Viewer initialized successfully');
  </script>
</body>
</html>
